      const { user, logout } = useAuth();
      return (
        <aside className="surface" style={{ width: 240, height: '100vh', borderRadius: 0, borderRight: '1px solid var(--border)', display: 'flex', flexDirection: 'column', flexShrink: 0 }}>
          <div className="flex items-center gap-2 p-4" style={{ color: 'var(--accent)', borderBottom: '1px solid var(--border)' }}>
            {Icon.capelo}<span className="font-bold">EstágioIBMEC</span>
          </div>
          <div className="flex-1 overflow-y-auto">
            <div className="section-label">Menu</div>
            {items.map(it => (
              <div key={it.id} className={`nav-item ${active === it.id ? 'active' : ''}`} onClick={() => onNav(it.id)}>{it.icon}<span>{it.label}</span></div>
            ))}
          </div>
          <div style={{ padding: 12, borderTop: '1px solid var(--border)' }}>
            <div className="flex items-center gap-2">
              <Avatar nome={user?.nome || user?.username} id={user?.id} size={32} />
              <div className="flex-1 min-w-0">
                <div className="text-xs truncate">{user?.nome || user?.username}</div>
                <button onClick={logout} className="text-[10px] uppercase" style={{ color: 'var(--muted)' }}>Sair</button>
              </div>
            </div>
          </div>
        </aside>
      );
    }

    function AlunoHome({ onNavigate }) {
      const [processo, setProcesso] = useState(null);
      const [loading, setLoading] = useState(true);
      const [wizardOpen, setWizardOpen] = useState(false);
      const load = useCallback(async () => {
        setLoading(true);
        try { const ps = await Api.processos(); setProcesso(ps[0] || null); }
        finally { setLoading(false); }
      }, []);
      useEffect(() => { load(); }, [load]);
      if (loading) return <LoadingBlock />;
      if (!processo) return (
        <>
          <div className="surface p-10 text-center">
            <div style={{ fontSize: 48, marginBottom: 12 }}>📋</div>
            <h2 className="text-xl font-semibold">Nenhum processo de estágio</h2>
            <p className="mt-2 mb-5" style={{ color: 'var(--muted)' }}>Comece agora preenchendo o formulário de abertura.</p>
            <button className="btn btn-primary" onClick={() => setWizardOpen(true)}>+ Iniciar Processo de Estágio</button>
          </div>
          {wizardOpen && <IniciarProcessoWizard onClose={() => setWizardOpen(false)} onCriado={() => { setWizardOpen(false); load(); }} />}
        </>
      );
      return (
        <div className="space-y-5">
          <h1 className="text-2xl font-bold">Bem-vindo(a)!</h1>
          <div className="surface p-5">
            <div className="flex justify-between items-start gap-3 flex-wrap">
              <div>
                <div className="text-xs uppercase" style={{ color: 'var(--muted)' }}>Processo atual</div>
                <div className="text-xl font-semibold mt-1">Processo #{processo.id}</div>
              </div>
              <StatusBadge status={processo.status} />
            </div>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mt-5">
              <KpiCard label="Horas/sem" value={processo.horas_semanais} />
              <KpiCard label="Início" value={processo.data_inicio_prevista} />
              <KpiCard label="Fim" value={processo.data_fim_prevista} />
              <KpiCard label="Bolsa" value={processo.valor_bolsa != null ? `R$${parseFloat(processo.valor_bolsa).toFixed(0)}` : '—'} color="var(--accent2)" />
            </div>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
            <button className="surface p-5 text-left" style={{ transition: 'all .15s' }} onClick={() => onNavigate('processo')}>
              <div style={{ fontSize: 22, marginBottom: 6 }}>📋</div>
              <div className="font-semibold">Ver meu processo</div>
              <div className="text-sm mt-1" style={{ color: 'var(--muted)' }}>Detalhes, status, plano</div>
            </button>
            <button className="surface p-5 text-left" onClick={() => onNavigate('documentos')}>
              <div style={{ fontSize: 22, marginBottom: 6 }}>📄</div>
              <div className="font-semibold">Documentos</div>
              <div className="text-sm mt-1" style={{ color: 'var(--muted)' }}>TCE, avaliações</div>
            </button>
            <button className="surface p-5 text-left" onClick={() => onNavigate('documentos')}>
              <div style={{ fontSize: 22, marginBottom: 6 }}>📝</div>
              <div className="font-semibold">Preencher avaliação</div>
              <div className="text-sm mt-1" style={{ color: 'var(--muted)' }}>Formulário do estágio</div>
            </button>
          </div>
        </div>
      );
    }

    function AlunoProcesso() {
      const [processos, setProcessos] = useState(null);
      const [loading, setLoading] = useState(true);
      const [wizardOpen, setWizardOpen] = useState(false);
      const [selected, setSelected] = useState(null);
      const load = useCallback(async () => {
        setLoading(true);
        try { setProcessos(await Api.processos()); }
        finally { setLoading(false); }
      }, []);
      useEffect(() => { load(); }, [load]);
      if (loading) return <LoadingBlock />;
      return (
        <div className="space-y-4">
          <div className="flex items-center justify-between">
            <h1 className="text-2xl font-bold">Meus Processos</h1>
            <button className="btn btn-primary" onClick={() => setWizardOpen(true)}>+ Iniciar Novo Processo</button>
          </div>
          {wizardOpen && <IniciarProcessoWizard onClose={() => setWizardOpen(false)} onCriado={() => { setWizardOpen(false); load(); }} />}
          <div className="space-y-3">
            {(processos || []).map(p => (
              <div key={p.id} className="surface p-4 cursor-pointer" onClick={() => setSelected(p)}>
                <div className="flex justify-between items-center gap-3">
                  <div>
                    <div className="font-semibold">Processo #{p.id}</div>
                    <div className="text-xs mt-1" style={{ color: 'var(--muted)' }}>{p.horas_semanais}h/sem · {p.data_inicio_prevista} → {p.data_fim_prevista}</div>
                  </div>
                  <StatusBadge status={p.status} />
                </div>
              </div>
            ))}
            {(!processos || processos.length === 0) && <div className="surface p-8 text-center" style={{ color: 'var(--muted)' }}>Nenhum processo.</div>}
          </div>
          {selected && <ProcessoDetailModal processo={selected} onClose={() => setSelected(null)} onChanged={load} role="aluno" />}
        </div>
      );
    }

    function AlunoDocumentos() {
      const toast = useToast();
      const [processo, setProcesso] = useState(null);
      const [documentos, setDocumentos] = useState([]);
      const [loading, setLoading] = useState(true);
      const [relatorioModal, setRelatorioModal] = useState(null); // 'parcial' | 'final' | null
      const [uploadOpen, setUploadOpen] = useState(false);
      const load = useCallback(async () => {
        setLoading(true);
        try {
          const ps = await Api.processos();
          const p = ps[0]; if (!p) { setProcesso(null); setDocumentos([]); return; }
          setProcesso(p); setDocumentos(await Api.documentosProcesso(p.id));
        } finally { setLoading(false); }
      }, []);
      useEffect(() => { load(); }, [load]);
      async function gerar(tipo) {
        try {
          let url;
          let filename;
          if (tipo === 'tce') { url = await Api.gerarTCE(processo.id); filename = `tce_${processo.id}.pdf`; }
          else if (tipo === 'termo') { url = await Api.gerarTermo(processo.id); filename = `termo_${processo.id}.pdf`; }
          abrirBlobUrl(url, filename);
        } catch (e) { toast.error(e.message); }
      }
      if (loading) return <LoadingBlock />;
      if (!processo) return <div className="surface p-8 text-center" style={{ color: 'var(--muted)' }}>Sem processo.</div>;

      const podeAgir = STATUS_ALUNO_PODE_AGIR.includes(processo.status);
      const temParcial = documentos.some(d => d.tipo === 'RELATORIO_PARCIAL');
      const temFinal = documentos.some(d => d.tipo === 'RELATORIO_FINAL');

      return (
        <div className="space-y-5">
          <h1 className="text-2xl font-bold">Documentos</h1>

          {!podeAgir && (
            <div className="surface p-4" style={{ borderLeft: `4px solid var(--accent3)`, background: 'rgba(255,107,107,.08)' }}>
              <div className="font-semibold">Este processo foi {STATUS_PROC[processo.status]?.label?.toLowerCase() || processo.status.toLowerCase()}.</div>
              <div className="text-sm mt-1" style={{ color: 'var(--muted)' }}>Nenhuma ação adicional está disponível. Você pode visualizar os documentos abaixo.</div>
            </div>
          )}

          {podeAgir && (
            <div className="surface p-5">
              <div className="font-semibold mb-3">Ações disponíveis</div>
              <div className="flex flex-wrap gap-2">
                <button className="btn btn-primary" onClick={() => gerar('tce')}>📄 Gerar TCE</button>
                <button className="btn btn-primary" onClick={() => gerar('termo')}>📄 Termo de Realização</button>
                <button className="btn btn-success" disabled={temParcial} onClick={() => setRelatorioModal('parcial')}>
                  📝 Preencher Relatório Parcial{temParcial ? ' (enviado)' : ''}
                </button>
                {temParcial && (
                  <button className="btn btn-success" disabled={temFinal} onClick={() => setRelatorioModal('final')}>
                    📝 Preencher Relatório Final{temFinal ? ' (enviado)' : ''}
                  </button>
                )}
                <button className="btn btn-secondary" onClick={() => setUploadOpen(true)}>⬆ Enviar Documento</button>
              </div>
            </div>
          )}

          <div className="surface p-5">
            <div className="font-semibold mb-3">Documentos do processo ({documentos.length})</div>
            <DocumentosLista documentos={documentos} canValidate={false} onChanged={load} />
          </div>

          {relatorioModal && (
            <PreencherFormulario
              processo={processo}
              tipoRelatorio={relatorioModal}
              onClose={() => setRelatorioModal(null)}
              onDone={() => { setRelatorioModal(null); load(); }}
            />
          )}
          {uploadOpen && (
            <UploadDocumentoModal
              processo={processo}
              onClose={() => setUploadOpen(false)}
              onDone={() => { setUploadOpen(false); load(); }}
            />
          )}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════
    //  DocumentosLista — usada por aluno, coord e visão global
    // ═══════════════════════════════════════════════════════
    function DocumentosLista({ documentos, canValidate, onChanged }) {
      const toast = useToast();
      const [confirmacao, setConfirmacao] = useState(null); // { doc, novoStatus }
      async function visualizar(d) {
        if (!d.arquivo) { toast.error('Arquivo indisponível.'); return; }
        // Usa anchor para evitar popup blocker.
        abrirBlobUrl(d.arquivo);
      }
      async function executarValidacao(coment) {
        const { doc, novoStatus } = confirmacao;
        try {
          await Api.validarDocumento(doc.id, novoStatus, coment);
          toast.success(`Documento ${novoStatus === 'APROVADO' ? 'aprovado' : 'reprovado'}.`);
          setConfirmacao(null);
          onChanged && onChanged();
        } catch (e) { toast.error(e.message); }
      }
      if (!documentos || documentos.length === 0) {
        return <div className="text-sm" style={{ color: 'var(--muted)' }}>Nenhum documento enviado ainda.</div>;
      }
      return (
        <div className="space-y-2">
          {documentos.map(d => {
            const nomeArquivo = (d.arquivo || '').split('/').pop() || '—';
            return (
              <div key={d.id} className="surface2 p-3 flex items-center justify-between gap-3 flex-wrap">
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-medium">{TIPO_DOC[d.tipo] || d.tipo}</div>
                  <div className="text-xs truncate" style={{ color: 'var(--muted)' }}>{nomeArquivo}</div>
                  <div className="text-xs" style={{ color: 'var(--muted)' }}>
                    v{d.versao} · {new Date(d.data_upload).toLocaleDateString('pt-BR')}
                    {d.enviado_por_nome ? ` · por ${d.enviado_por_nome}` : ''}
                  </div>
                  {d.observacoes && d.status === 'REJEITADO' && (
                    <div className="text-xs mt-1 p-2 rounded" style={{ background: 'rgba(255,107,107,.1)', color: 'var(--accent3)' }}>
                      <b>Observação:</b> {d.observacoes}
                    </div>
                  )}
                  {d.observacoes && d.status !== 'REJEITADO' && (
                    <div className="text-xs mt-1 italic" style={{ color: 'var(--accent4)' }}>"{d.observacoes}"</div>
                  )}
                </div>
                <DocStatusBadge status={d.status} />
                <div className="flex gap-1">
                  {d.arquivo && <button className="btn btn-secondary" style={{ fontSize: 11 }} onClick={() => visualizar(d)}>👁 Visualizar</button>}
                  {d.arquivo && <a className="btn btn-secondary" style={{ fontSize: 11 }} href={d.arquivo} download>⬇ Download</a>}
                  {canValidate && d.status === 'PENDENTE' && (
                    <>
                      <button className="btn btn-success" style={{ fontSize: 11 }} onClick={() => setConfirmacao({ doc: d, novoStatus: 'APROVADO' })}>Aprovar</button>
                      <button className="btn btn-danger" style={{ fontSize: 11 }} onClick={() => setConfirmacao({ doc: d, novoStatus: 'REJEITADO' })}>Reprovar</button>
                    </>
                  )}
                </div>
              </div>
            );
          })}
          <ConfirmModal
            open={!!confirmacao}
            onClose={() => setConfirmacao(null)}
            title={confirmacao?.novoStatus === 'APROVADO' ? 'Aprovar documento' : 'Reprovar documento'}
            message={`Confirma ${confirmacao?.novoStatus === 'APROVADO' ? 'a aprovação' : 'a reprovação'} de "${TIPO_DOC[confirmacao?.doc?.tipo] || confirmacao?.doc?.tipo}"?`}
            justificativaLabel={confirmacao?.novoStatus === 'REJEITADO' ? 'Motivo da reprovação' : 'Observação (opcional)'}
            justificativaObrigatoria={confirmacao?.novoStatus === 'REJEITADO'}
            confirmLabel={confirmacao?.novoStatus === 'APROVADO' ? 'Aprovar' : 'Reprovar'}
            confirmVariant={confirmacao?.novoStatus === 'APROVADO' ? 'success' : 'danger'}
            onConfirm={executarValidacao}
          />
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════
    //  UploadDocumentoModal — aluno envia documento ao processo
    // ═══════════════════════════════════════════════════════
    function UploadDocumentoModal({ processo, onClose, onDone }) {
      const toast = useToast();
      const [tipo, setTipo] = useState('APOLICE');
      const [arquivo, setArquivo] = useState(null);
      const [enviando, setEnviando] = useState(false);
      // Tipos que o aluno pode enviar (TCE, relatórios e termo são gerados pelo sistema).
      const TIPOS_UPLOAD = [
        ['APOLICE', 'Apólice de Seguro'],
        ['OUTRO', 'Outro Documento'],
      ];
      async function submit() {
        if (!arquivo) { toast.error('Selecione um arquivo.'); return; }
        setEnviando(true);
        try {
          await Api.uploadDocumento(processo.id, tipo, arquivo);
          toast.success('Documento enviado.');
          onDone && onDone();
        } catch (e) {
          const d = e.data || {};
          const ms = Object.entries(d).map(([k, v]) => `${k}: ${Array.isArray(v) ? v.join(' ') : v}`);
          toast.error(ms.join(' | ') || e.message);
        } finally { setEnviando(false); }
      }
      return (
        <Modal open title="Enviar Documento" onClose={onClose} size="sm">
          <div className="space-y-3">
            <div>
              <label className="block text-xs uppercase mb-1" style={{ color: 'var(--muted)' }}>Tipo</label>
              <select className="input" value={tipo} onChange={e => setTipo(e.target.value)}>
                {TIPOS_UPLOAD.map(([v, l]) => <option key={v} value={v}>{l}</option>)}
              </select>
            </div>
            <div>
              <label className="block text-xs uppercase mb-1" style={{ color: 'var(--muted)' }}>Arquivo (PDF, máx 10 MB)</label>
              <input type="file" accept=".pdf" className="input" style={{ padding: '6px 10px' }} onChange={e => setArquivo(e.target.files?.[0] || null)} />
              {arquivo && <div className="text-xs mt-1" style={{ color: 'var(--muted)' }}>{arquivo.name} · {(arquivo.size / 1024).toFixed(1)} KB</div>}
            </div>
            <div className="text-xs" style={{ color: 'var(--muted)' }}>Apenas PDFs são aceitos. Documentos passam por validação automática e revisão do coordenador.</div>
            <div className="flex justify-end gap-2 pt-3" style={{ borderTop: '1px solid var(--border)' }}>
              <button className="btn btn-secondary" onClick={onClose} disabled={enviando}>Cancelar</button>
              <button className="btn btn-primary" onClick={submit} disabled={enviando || !arquivo}>
                {enviando ? <Spinner size={14} /> : 'Enviar'}
              </button>
            </div>
          </div>
        </Modal>
      );
    }

    function ProcessoDetailModal({ processo, onClose, onChanged, role }) {
      const toast = useToast();
      const { user } = useAuth();
      const readOnly = isVisaoGlobal(user);
      const ehAluno = role === 'aluno';
      const [docs, setDocs] = useState([]);
      const [full, setFull] = useState(null);
      const [load, setLoad] = useState(true);
      const [confirmTransicao, setConfirmTransicao] = useState(null);
      useEffect(() => {
        Promise.all([Api.processo(processo.id), Api.documentosProcesso(processo.id)])
          .then(([f, d]) => { setFull(f); setDocs(d); })
          .catch(e => toast.error(e.message))
          .finally(() => setLoad(false));
      }, [processo, toast]);
      async function executarTransicao(novoStatus, justif) {
        try {
          await Api.alterarStatus(processo.id, novoStatus, justif);
          toast.success('Status atualizado.');
          onChanged && onChanged();
          onClose();
        } catch (e) { toast.error(e.message); }
      }
      // Aluno só vê CANCELADO. Coordenador vê todas as transições válidas.
      const transAll = full ? TRANSICOES[full.status] || [] : [];
      const trans = ehAluno
        ? (STATUS_ALUNO_PODE_CANCELAR.includes(full?.status) ? ['CANCELADO'] : [])
        : transAll;
      const tConf = confirmTransicao;
      const tConfInfo = tConf ? STATUS_PROC[tConf] : null;
      // Justificativa obrigatória para REJEITADO; recomendada para CANCELADO.
      const justifLabel = tConf === 'REJEITADO' ? 'Justificativa da rejeição'
                        : tConf === 'CANCELADO' ? 'Motivo do cancelamento'
                        : tConf === 'CORRECAO_SOLICITADA' ? 'O que precisa ser corrigido' : null;
      const justifObrig = tConf === 'REJEITADO' || tConf === 'CANCELADO' || tConf === 'CORRECAO_SOLICITADA';
      const variant = tConf === 'CANCELADO' || tConf === 'REJEITADO' ? 'danger'
                    : tConf === 'APROVADO' || tConf === 'ATIVO' || tConf === 'ENCERRADO' ? 'success'
                    : 'primary';
      return (
        <Modal open title={`Processo #${processo.id}`} onClose={onClose} size="lg">
          {load || !full ? <LoadingBlock /> : (
            <div className="space-y-4">
              <div className="flex items-center gap-2"><StatusBadge status={full.status} /></div>
              <div className="grid grid-cols-2 gap-3 text-sm">
                <DataRow label="Horas/sem" value={full.horas_semanais} />
                <DataRow label="Bolsa" value={full.valor_bolsa != null ? `R$${parseFloat(full.valor_bolsa).toFixed(2)}` : '—'} />
                <DataRow label="Início previsto" value={full.data_inicio_prevista} />
                <DataRow label="Fim previsto" value={full.data_fim_prevista} />
                <div className="col-span-2"><div className="text-xs uppercase mb-1" style={{ color: 'var(--muted)' }}>Plano</div><div className="surface2 p-3">{full.plano_atividades || '—'}</div></div>
                {full.justificativa_rejeicao && <div className="col-span-2"><div className="text-xs uppercase mb-1" style={{ color: 'var(--accent3)' }}>Justificativa rejeição</div><div className="p-3 rounded" style={{ background: 'rgba(255,107,107,.1)' }}>{full.justificativa_rejeicao}</div></div>}
              </div>
              <div>
                <div className="font-semibold mb-2">Documentos ({docs.length})</div>
                <div className="space-y-2">
                  {docs.map(d => (
                    <div key={d.id} className="surface2 p-3 flex justify-between items-center gap-3">
                      <div><div className="text-sm font-medium">{TIPO_DOC[d.tipo] || d.tipo}</div><div className="text-xs" style={{ color: 'var(--muted)' }}>v{d.versao}</div></div>
                      <DocStatusBadge status={d.status} />
                      {d.arquivo && <a href={d.arquivo} target="_blank" rel="noreferrer" className="btn btn-secondary" style={{ fontSize: 11 }}>Abrir</a>}
                    </div>
                  ))}
                </div>
              </div>
              {trans.length > 0 && !readOnly && (
                <div>
                  <div className="font-semibold mb-2">{ehAluno ? 'Ações' : 'Transições'}</div>
                  <div className="flex flex-wrap gap-2">
                    {trans.map(t => {
                      const isCancel = t === 'CANCELADO' || t === 'REJEITADO';
                      const isOk = t === 'APROVADO' || t === 'ATIVO' || t === 'ENCERRADO';
                      const cls = isCancel ? 'btn-danger' : isOk ? 'btn-success' : 'btn-secondary';
                      return (
                        <button key={t} className={`btn ${cls}`} onClick={() => setConfirmTransicao(t)}>
                          {ehAluno && t === 'CANCELADO' ? 'Cancelar Processo' : `→ ${STATUS_PROC[t]?.label || t}`}
                        </button>
                      );
                    })}
                  </div>
                </div>
              )}
              {readOnly && (
                <div className="text-xs italic" style={{ color: 'var(--muted)' }}>Visualização — sem ações disponíveis para o perfil {CARGO_LABEL[user?.tipo] || user?.tipo}.</div>
              )}
            </div>
          )}
          <ConfirmModal
            open={!!tConf}
            onClose={() => setConfirmTransicao(null)}
            title={ehAluno && tConf === 'CANCELADO' ? 'Cancelar processo de estágio' : `Confirmar: ${tConfInfo?.label || tConf}`}
            message={ehAluno && tConf === 'CANCELADO'
              ? 'Tem certeza que deseja cancelar seu processo de estágio? Esta ação não pode ser desfeita.'
              : `Confirma a transição para "${tConfInfo?.label || tConf}"?`}
            justificativaLabel={justifLabel}
            justificativaObrigatoria={justifObrig}
            confirmLabel={ehAluno && tConf === 'CANCELADO' ? 'Confirmar Cancelamento' : `Confirmar`}
            confirmVariant={variant}
            onConfirm={(j) => executarTransicao(tConf, j)}
          />
        </Modal>
      );
    }

    // ═══════════════════════════════════════════════════════
    //  WIZARD INICIAR PROCESSO
    // ═══════════════════════════════════════════════════════
    function IniciarProcessoWizard({ onClose, onCriado }) {
      const toast = useToast();
      const { user } = useAuth();
      const [etapa, setEtapa] = useState(1);
      const [empresas, setEmpresas] = useState([]);
      const [supervisores, setSupervisores] = useState([]);
      const [perfil, setPerfil] = useState(null);
      const [cursos, setCursos] = useState([]);
      const [arquivo, setArquivo] = useState(null);
      const [extraindo, setExtraindo] = useState(false);
      const [extraidos, setExtraidos] = useState({});
      const [form, setForm] = useState({ empresa: '', supervisor: '', horas_semanais: '', data_inicio_prevista: '', data_fim_prevista: '', plano_atividades: '', valor_bolsa: '' });
      const [criando, setCriando] = useState(false);
      const [novaEmpresa, setNovaEmpresa] = useState(null);

      useEffect(() => {
        Promise.all([Api.empresas().catch(() => []), Api.supervisores().catch(() => []), Api.alunos().catch(() => []), Api.cursos().catch(() => [])])
          .then(([e, s, a, c]) => { setEmpresas(e); setSupervisores(s); setPerfil(a[0] || null); setCursos(c); });
      }, []);

      const upd = (k, v) => setForm(s => ({ ...s, [k]: v }));

      async function onUpload(file) {
        if (!file) return;
        setArquivo(file);
        if (!file.name.toLowerCase().endsWith('.pdf')) {
          toast.info('Anexado. Extração só funciona com PDF.');
          return;
        }
        setExtraindo(true);
        try {
          const t = await extrairTextoPdf(file);
          const c = extrairCamposDoTexto(t);
          setExtraidos(c);
          const patch = {};
          if (c.data_inicio_prevista) patch.data_inicio_prevista = c.data_inicio_prevista;
          if (c.data_fim_prevista) patch.data_fim_prevista = c.data_fim_prevista;
          if (c.horas_semanais) patch.horas_semanais = String(c.horas_semanais);
          if (c.valor_bolsa) patch.valor_bolsa = String(c.valor_bolsa);
          if (c.cnpj) {
            const cl = c.cnpj.replace(/\D/g, '');
            const m = empresas.find(e => (e.cnpj || '').replace(/\D/g, '') === cl);
            if (m) patch.empresa = String(m.id);
          }
          setForm(s => ({ ...s, ...patch }));
          const n = Object.keys(c).length;
          if (n > 0) toast.success(`Extraídos ${n} campo(s) do PDF.`);
          else toast.info('Nenhum campo detectado.');
        } catch (e) { toast.error('Falha PDF: ' + e.message); }
        finally { setExtraindo(false); }
      }

      function podeAvancar() {
        if (etapa === 1) return true;
        if (etapa === 2) return form.empresa && form.horas_semanais && form.data_inicio_prevista && form.data_fim_prevista && form.plano_atividades.trim();
        return true;
      }

      async function submit() {
        setCriando(true);
        try {
          const novo = await Api.criarProcesso({
            empresa: Number(form.empresa), horas_semanais: Number(form.horas_semanais),
            data_inicio_prevista: form.data_inicio_prevista, data_fim_prevista: form.data_fim_prevista,
            plano_atividades: form.plano_atividades,
          });
          toast.success(`Processo #${novo.id} criado!`);
          onCriado && onCriado(novo);
        } catch (e) {
          const d = e.data || {};
          const ms = Object.entries(d).map(([k, v]) => `${k}: ${Array.isArray(v) ? v.join(' ') : v}`);
          toast.error(ms.join(' | ') || e.message);
        } finally { setCriando(false); }
      }

      const empresaSel = empresas.find(e => String(e.id) === String(form.empresa));
      const supsDaEmp = supervisores.filter(s => String(s.empresa) === String(form.empresa));
      const cursoNome = perfil?.curso ? (cursos.find(c => c.id === perfil.curso)?.nome || '—') : '—';

      return (
        <Modal open title="Iniciar Processo de Estágio" onClose={onClose} size="xl">
          <div className="space-y-4">
            <div className="flex items-center gap-2">
              {[1, 2, 3].map(n => (
                <React.Fragment key={n}>
                  <div style={{ color: etapa >= n ? 'var(--accent)' : 'var(--muted)' }} className="flex items-center gap-2">
                    <div style={{ width: 26, height: 26, borderRadius: '50%', background: etapa >= n ? 'var(--accent)' : 'var(--surface2)', color: etapa >= n ? 'white' : 'var(--muted)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 13, fontWeight: 600 }}>{n}</div>
                    <span className="text-sm hidden md:inline">{n === 1 ? 'Documento' : n === 2 ? 'Formulário' : 'Revisão'}</span>
                  </div>
                  {n < 3 && <div style={{ flex: 1, height: 1, background: etapa > n ? 'var(--accent)' : 'var(--border)' }} />}
                </React.Fragment>
              ))}
            </div>

            {etapa === 1 && (
              <div className="space-y-3">
                <div className="text-sm" style={{ color: 'var(--muted)' }}>Envie a carta da empresa, contrato ou proposta (PDF) — o sistema tenta pré-preencher os campos. Etapa opcional.</div>
                <label className="block">
                  <input type="file" className="hidden" accept=".pdf,image/*" onChange={e => onUpload(e.target.files?.[0])} />
                  <div className="drop-area">
                    {arquivo ? <><div style={{ fontSize: 28 }}>📄</div><div className="mt-2">{arquivo.name}</div><div className="text-xs mt-1" style={{ color: 'var(--muted)' }}>{(arquivo.size / 1024).toFixed(1)} KB</div></>
                            : <><div style={{ fontSize: 28 }}>⬆</div><div className="mt-2">Clique para selecionar</div><div className="text-xs mt-1" style={{ color: 'var(--muted)' }}>PDF ou imagem</div></>}
                  </div>
                </label>
                {extraindo && <div className="flex items-center gap-2 text-sm" style={{ color: 'var(--muted)' }}><Spinner size={16} /> Lendo PDF…</div>}
                {Object.keys(extraidos).length > 0 && (
                  <div className="surface p-3" style={{ borderLeft: '3px solid var(--accent2)' }}>
                    <div className="text-sm font-semibold mb-2" style={{ color: 'var(--accent2)' }}>Campos detectados:</div>
                    <ul className="text-xs space-y-1">
                      {Object.entries(extraidos).map(([k, v]) => <li key={k}><span style={{ color: 'var(--muted)' }}>{k}:</span> {String(v)}</li>)}
                    </ul>
                  </div>
                )}
              </div>
            )}

            {etapa === 2 && (
              <div className="space-y-4">
                <div className="surface2 p-3">
                  <div className="text-xs uppercase mb-2" style={{ color: 'var(--muted)' }}>Dados do aluno</div>
                  <div className="grid grid-cols-2 gap-3 text-sm">
                    <DataRow label="Nome" value={user?.nome || user?.username} />
                    <DataRow label="Curso" value={cursoNome} />
                    <DataRow label="CR" value={perfil?.coeficiente_rendimento ?? '—'} />
                    <DataRow label="Período" value={perfil?.periodo_atual ?? '—'} />
                  </div>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                  <CampoForm label="Empresa *" extraido={extraidos.cnpj || extraidos.empresa_nome_extraido}>
                    <select className="input" value={form.empresa} onChange={e => upd('empresa', e.target.value)}>
                      <option value="">— Selecione —</option>
                      {empresas.map(e => <option key={e.id} value={e.id}>{e.razao_social}{!e.aprovada_ibmec ? ' (não aprovada)' : ''}</option>)}
                    </select>
                    <button type="button" className="text-xs mt-1 hover:underline" style={{ color: 'var(--accent)' }} onClick={() => setNovaEmpresa({ cnpj: extraidos.cnpj || '', razao_social: extraidos.empresa_nome_extraido || '' })}>+ Cadastrar nova</button>
                    {empresaSel && !empresaSel.aprovada_ibmec && <div className="text-xs mt-1" style={{ color: 'var(--accent4)' }}>⚠ Não aprovada — RN09 vai bloquear.</div>}
                  </CampoForm>
                  <CampoForm label="Supervisor (opcional)">
                    <select className="input" value={form.supervisor} onChange={e => upd('supervisor', e.target.value)} disabled={!form.empresa}>
                      <option value="">— Selecione —</option>
                      {supsDaEmp.map(s => <option key={s.id} value={s.id}>Supervisor #{s.id} {s.cargo ? `(${s.cargo})` : ''}</option>)}
                    </select>
                  </CampoForm>
                  <CampoForm label="Horas semanais *" extraido={extraidos.horas_semanais}>
                    <input className="input" type="number" min="1" max="30" value={form.horas_semanais} onChange={e => upd('horas_semanais', e.target.value)} />
                    <div className="text-xs mt-1" style={{ color: 'var(--muted)' }}>Limite legal: 30h/sem</div>
                  </CampoForm>
                  <CampoForm label="Valor bolsa (opcional)" extraido={extraidos.valor_bolsa}>
                    <input className="input" type="number" step="0.01" value={form.valor_bolsa} onChange={e => upd('valor_bolsa', e.target.value)} placeholder="0.00" />
                  </CampoForm>
                  <CampoForm label="Início *" extraido={extraidos.data_inicio_prevista}>
                    <input className="input" type="date" value={form.data_inicio_prevista} onChange={e => upd('data_inicio_prevista', e.target.value)} />
                  </CampoForm>
                  <CampoForm label="Fim *" extraido={extraidos.data_fim_prevista}>
                    <input className="input" type="date" value={form.data_fim_prevista} onChange={e => upd('data_fim_prevista', e.target.value)} />
                  </CampoForm>
                  <div className="md:col-span-2"><CampoForm label="Plano de atividades *">
                    <textarea className="input" rows="4" value={form.plano_atividades} onChange={e => upd('plano_atividades', e.target.value)} placeholder="Descreva…" />
                  </CampoForm></div>
                </div>
              </div>
            )}

            {etapa === 3 && (
              <div className="space-y-3">
                <div className="text-sm" style={{ color: 'var(--muted)' }}>Confira antes de enviar:</div>
                <div className="surface2 p-4 grid grid-cols-2 gap-3 text-sm">
                  <DataRow label="Aluno" value={user?.nome} />
                  <DataRow label="Curso" value={cursoNome} />
                  <DataRow label="Empresa" value={empresaSel?.razao_social || '—'} />
                  <DataRow label="CNPJ" value={empresaSel?.cnpj || '—'} />
                  <DataRow label="Horas/sem" value={form.horas_semanais} />
                  <DataRow label="Bolsa" value={form.valor_bolsa ? `R$${form.valor_bolsa}` : '—'} />
                  <DataRow label="Início" value={form.data_inicio_prevista} />
                  <DataRow label="Fim" value={form.data_fim_prevista} />
                  <div className="col-span-2">
                    <div className="text-xs uppercase mb-1" style={{ color: 'var(--muted)' }}>Plano</div>
                    <div className="surface p-3 whitespace-pre-wrap text-sm">{form.plano_atividades}</div>
                  </div>
                </div>
              </div>
            )}

            <div className="flex justify-between gap-2 pt-3" style={{ borderTop: '1px solid var(--border)' }}>
              <button className="btn btn-secondary" disabled={etapa === 1} onClick={() => setEtapa(e => e - 1)}>← Voltar</button>
              {etapa < 3
                ? <button className="btn btn-primary" disabled={!podeAvancar()} onClick={() => setEtapa(e => e + 1)}>Próximo →</button>
                : <button className="btn btn-success" disabled={criando} onClick={submit}>{criando ? <Spinner size={14} /> : '✓ Criar Processo'}</button>}
            </div>
          </div>

          {novaEmpresa && <NovaEmpresaModal initial={novaEmpresa} onClose={() => setNovaEmpresa(null)} onSaved={emp => { setEmpresas(es => [...es, emp]); upd('empresa', String(emp.id)); setNovaEmpresa(null); toast.success('Empresa cadastrada.'); }} />}
        </Modal>
      );
    }

    function CampoForm({ label, extraido, children }) {
      return (
        <div>
          <div className="flex items-center justify-between mb-1">
            <label className="block text-xs uppercase" style={{ color: 'var(--muted)' }}>{label}</label>
            {extraido != null && extraido !== '' && <span style={{ fontSize: 9, padding: '2px 7px', borderRadius: 9999, background: 'rgba(0,212,170,.15)', color: 'var(--accent2)', fontWeight: 600 }}>📄 PDF</span>}
          </div>
          {children}
        </div>
      );
    }

    function NovaEmpresaModal({ initial, onClose, onSaved }) {
      const toast = useToast();
      const [form, setForm] = useState({ cnpj: initial?.cnpj || '', razao_social: initial?.razao_social || '', areas_atuacao: '', localizacao: '', email_contato: '' });
      const [salv, setSalv] = useState(false);
      const upd = (k, v) => setForm(s => ({ ...s, [k]: v }));
      async function submit() {
        setSalv(true);
        try { onSaved(await Api.criarEmpresa(form)); }
        catch (e) {
          if (e.status === 403) toast.error('Apenas administradores podem cadastrar empresas.');
          else toast.error(e.message);
        } finally { setSalv(false); }
      }
      return (
        <Modal open title="Cadastrar nova empresa" onClose={onClose} size="md">
          <div className="space-y-3">
            {['cnpj', 'razao_social', 'areas_atuacao', 'localizacao', 'email_contato'].map(k => (
              <div key={k}>
                <label className="block text-xs uppercase mb-1" style={{ color: 'var(--muted)' }}>{k.replace('_', ' ')}</label>
                <input className="input" value={form[k]} onChange={e => upd(k, e.target.value)} type={k === 'email_contato' ? 'email' : 'text'} />
              </div>
            ))}
            <div className="flex justify-end gap-2 pt-3" style={{ borderTop: '1px solid var(--border)' }}>
              <button className="btn btn-secondary" onClick={onClose}>Cancelar</button>
              <button className="btn btn-primary" disabled={salv} onClick={submit}>{salv ? <Spinner size={14} /> : 'Salvar'}</button>
            </div>
          </div>
        </Modal>
      );
    }

    // ═══════════════════════════════════════════════════════
    //  PREENCHER FORMULÁRIO / GERAR RELATÓRIO
    // ═══════════════════════════════════════════════════════
    // ── Verifica se uma seção foi suficientemente preenchida ──
    function secaoCompleta(sec, respostas) {
      if (sec.tipo === 'auto') return true;
      const v = respostas[sec.id];
      const itens = sec.itens || [];
      if (sec.tipo === 'escala_1_4') {
        if (!v || typeof v !== 'object') return false;
        return itens.every(it => typeof v[it] === 'number');
      }
      if (sec.tipo === 'escala_3') {
        if (!v || typeof v !== 'object') return false;
        return itens.every(it => typeof v[it] === 'string' && v[it]);
      }
      if (sec.tipo === 'escala_1_4_multi') {
        if (!v || typeof v !== 'object') return false;
        return itens.every(it => v[it] && (sec.colunas || []).some(c => typeof v[it][c] === 'number'));
      }
      if (sec.tipo === 'checkbox_duplo') {
        if (!v || typeof v !== 'object') return false;
        return Object.values(v).some(arr => Array.isArray(arr) && arr.length > 0);
      }
      if (sec.tipo === 'texto_livre') {
        return typeof v === 'string' && v.trim().length > 0;
      }
      return true;
    }

    function PreencherFormulario({ processo, tipoRelatorio, onClose, onDone }) {
      const toast = useToast();
      const { user } = useAuth();
      const [modelo, setModelo] = useState(null);
      const [respostas, setRespostas] = useState({});
      const [aluno, setAluno] = useState(null);
      const [empresa, setEmpresa] = useState(null);
      const tipoRel = tipoRelatorio || 'parcial';
      const [load, setLoad] = useState(true);
      const [env, setEnv] = useState(false);
      const [secAtiva, setSecAtiva] = useState(0);
      useEffect(() => {
        Promise.all([
          Api.modelosFormulario(),
          Api.alunos().catch(() => []),
          processo.empresa ? Api.empresa(processo.empresa).catch(() => null) : Promise.resolve(null),
        ]).then(([ms, alunos, emp]) => {
          const m = ms.find(x => x.ativo) || ms[0];
          if (!m) { toast.error('Nenhum modelo disponível.'); onClose(); return; }
          setModelo(m);
          setAluno(alunos[0] || null);
          setEmpresa(emp);
          if (processo.respostas_formulario?.secoes) {
            setRespostas(processo.respostas_formulario.secoes);
          }
        }).catch(e => toast.error(e.message)).finally(() => setLoad(false));
      }, [processo, toast, onClose]);
      const setResp = (sid, v) => setRespostas(r => ({ ...r, [sid]: v }));
      const setExtra = (sid, suffix, v) => setRespostas(r => ({ ...r, [`${sid}_${suffix}`]: v }));
      async function submit() {
        setEnv(true);
        try {
          const url = await Api.preencherFormulario(processo.id, { tipo_relatorio: tipoRel, respostas, preview: false });
          abrirBlobUrl(url, `relatorio_${tipoRel}_${processo.id}.pdf`);
          toast.success(`Relatório ${tipoRel} enviado!`);
          onDone();
        } catch (e) {
          if (e.data?.erros_validacao) toast.error('Erros: ' + e.data.erros_validacao.join('; '));
          else toast.error(e.message);
        } finally { setEnv(false); }
      }
      if (load) return <Modal open title="Preencher relatório" onClose={onClose} size="xl"><LoadingBlock /></Modal>;
      if (!modelo) return null;
      const secs = modelo.secoes || [];
      const total = secs.length;
      const respCount = secs.filter(s => secaoCompleta(s, respostas)).length;
      const pct = total > 0 ? Math.round((respCount / total) * 100) : 0;
      const sec = secs[secAtiva];
      const isPrimeira = secAtiva === 0;
      const isUltima = secAtiva === total - 1;
      const tudoPreenchido = secs.every(s => secaoCompleta(s, respostas));
      return (
        <Modal open title={`Relatório ${tipoRel === 'final' ? 'Final' : 'Parcial'} — ${modelo.titulo}`} onClose={onClose} size="xl">
          <div className="space-y-4">
            <div>
              <div className="flex justify-between mb-1 text-xs">
                <span style={{ color: 'var(--muted)' }}>Progresso</span>
                <span>{respCount}/{total} seções ({pct}%)</span>
              </div>
              <div style={{ height: 6, background: 'var(--surface2)', borderRadius: 9999, overflow: 'hidden' }}>
                <div style={{ height: '100%', background: 'var(--accent)', width: `${pct}%`, transition: 'width .3s' }} />
              </div>
            </div>
            <div className="flex flex-wrap gap-1">
              {secs.map((s, i) => {
                const ok = secaoCompleta(s, respostas);
                return (
                  <button key={s.id}
                    style={{
                      padding: '4px 10px', fontSize: 11, borderRadius: 6,
                      background: i === secAtiva ? 'var(--accent)' : (ok ? 'rgba(0,212,170,.15)' : 'var(--surface2)'),
                      color: i === secAtiva ? 'white' : (ok ? 'var(--accent2)' : 'var(--text)'),
                    }}
                    onClick={() => setSecAtiva(i)}>
                    {i + 1}{ok ? ' ✓' : ''}
                  </button>
                );
              })}
            </div>
            {sec && (
              <div className="surface2 p-4">
                <SecaoInput
                  sec={sec}
                  processo={processo}
                  aluno={aluno}
                  empresa={empresa}
                  user={user}
                  valor={respostas[sec.id]}
                  onChange={v => setResp(sec.id, v)}
                  textoExtra={respostas[`${sec.id}_texto`]}
                  textoPositivoExtra={respostas[`${sec.id}_texto_positivo`]}
                  textoNegativoExtra={respostas[`${sec.id}_texto_negativo`]}
                  efetivacao={respostas[`${sec.id}_efetivacao`]}
                  onTextoChange={v => setExtra(sec.id, 'texto', v)}
                  onTextoPositivoChange={v => setExtra(sec.id, 'texto_positivo', v)}
                  onTextoNegativoChange={v => setExtra(sec.id, 'texto_negativo', v)}
                  onEfetivacaoChange={v => setExtra(sec.id, 'efetivacao', v)}
                />
              </div>
            )}
            {/* Navegação: Anterior (esquerda) | Próxima OU Enviar (direita) */}
            <div className="flex justify-between gap-2 pt-3" style={{ borderTop: '1px solid var(--border)' }}>
              <div>
                {!isPrimeira && (
                  <button className="btn btn-secondary" onClick={() => setSecAtiva(i => i - 1)}>← Anterior</button>
                )}
              </div>
              <div>
                {!isUltima && (
                  <button className="btn btn-primary" onClick={() => setSecAtiva(i => i + 1)}>Próxima →</button>
                )}
                {isUltima && (
                  <button
                    className="btn btn-primary"
                    disabled={env || !tudoPreenchido}
                    title={!tudoPreenchido ? 'Preencha todas as seções' : ''}
                    onClick={submit}
                  >
                    {env ? <Spinner size={14} /> : 'Enviar'}
                  </button>
                )}
              </div>
            </div>
          </div>
        </Modal>
      );
    }

    function SecaoInput({
      sec, processo, aluno, empresa, user, valor, onChange,
      textoExtra, textoPositivoExtra, textoNegativoExtra, efetivacao,
      onTextoChange, onTextoPositivoChange, onTextoNegativoChange, onEfetivacaoChange,
    }) {
      // Itens detalhados (descrição abaixo do nome) — usado na seção comportamental.
      const detalhesMap = {};
      (sec.itens_detalhados || []).forEach(d => { if (d?.nome) detalhesMap[d.nome] = d.descricao || ''; });
      const renderItemLabel = (it) => (
        detalhesMap[it]
          ? <div><div className="text-sm">{it}</div><div className="text-xs" style={{ color: 'var(--muted)' }}>{detalhesMap[it]}</div></div>
          : <span className="text-sm">{it}</span>
      );

      // ── header da seção (título + descrição) ──
      const header = (
        <>
          <div className="font-semibold mb-1" style={{ color: 'var(--accent)' }}>{sec.titulo}</div>
          {sec.descricao && <div className="text-xs mb-3" style={{ color: 'var(--muted)' }}>{sec.descricao}</div>}
        </>
      );

      // ── auto: seções 1 e 2 (dados do processo) ──
      if (sec.tipo === 'auto') {
        const fim = processo.data_fim_real || processo.data_fim_prevista;
        const ini = processo.data_inicio_real || processo.data_inicio_prevista;
        let semanas = '—', horasTotais = '—';
        if (ini && fim) {
          const d = (new Date(fim) - new Date(ini)) / 86400000;
          semanas = Math.max(1, Math.round(d / 7));
          horasTotais = semanas * (processo.horas_semanais || 0);
        }
        const fmtMoney = (v) => v != null ? `R$ ${parseFloat(v).toFixed(2)}` : '—';

        if (sec.id === 'estagiario') {
          return (
            <>
              {header}
              <div className="grid grid-cols-2 gap-3 text-sm">
                <DataRow label="Nome" value={user?.nome || '—'} />
                <DataRow label="Matrícula" value={user?.username || aluno?.usuario?.username || '—'} />
                <DataRow label="Curso" value={(aluno?.curso_nome || '—').toUpperCase()} />
                <DataRow label="Semestre atual" value={aluno?.periodo_atual ? `${aluno.periodo_atual}º` : '—'} />
                <DataRow label="Data de entrada" value={ini || '—'} />
                <DataRow label="Data de saída" value={fim || '—'} />
                <DataRow label="Horas/semana" value={processo.horas_semanais || '—'} />
                <DataRow label="Semanas trabalhadas" value={semanas} />
                <DataRow label="Horas totais" value={horasTotais} />
                <DataRow label="Remuneração média" value={fmtMoney(processo.valor_bolsa)} />
              </div>
            </>
          );
        }
        if (sec.id === 'empresa') {
          return (
            <>
              {header}
              <div className="grid grid-cols-2 gap-3 text-sm">
                <DataRow label="Empresa" value={empresa?.razao_social || '—'} />
                <DataRow label="CNPJ" value={empresa?.cnpj || '—'} />
                <DataRow label="Localização" value={empresa?.localizacao || '—'} />
                <DataRow label="Email contato" value={empresa?.email_contato || '—'} />
                <DataRow label="Responsável legal" value={empresa?.responsavel_legal_nome || '—'} />
                <DataRow label="Cargo do responsável" value={empresa?.responsavel_legal_cargo || '—'} />
              </div>
            </>
          );
        }
        return <>{header}<div className="text-sm" style={{ color: 'var(--muted)' }}>Dados automáticos do processo.</div></>;
      }

      const v = valor || {};

      // ── texto_livre (legado) ──
      if (sec.tipo === 'texto_livre') {
        return (
          <>
            {header}
            <textarea className="input" rows="5" value={valor || ''} onChange={e => onChange(e.target.value)} placeholder="Sua resposta…" />
          </>
        );
      }

      // ── escala_1_4 ──
      if (sec.tipo === 'escala_1_4') {
        return (
          <>
            {header}
            <div className="space-y-3">{(sec.itens || []).map(it => (
              <div key={it} className="flex justify-between items-center gap-3 py-1">
                <div className="flex-1">{renderItemLabel(it)}</div>
                <div className="flex gap-1">{[1,2,3,4].map(n => (
                  <button key={n} style={{ width: 32, height: 32, borderRadius: 6, background: v[it] === n ? 'var(--accent)' : 'transparent', border: `1px solid ${v[it] === n ? 'var(--accent)' : 'var(--border)'}`, color: v[it] === n ? 'white' : 'var(--text)' }} onClick={() => onChange({ ...v, [it]: n })}>{n}</button>
                ))}</div>
              </div>
            ))}</div>
            {sec.campo_efetivacao && (
              <div className="mt-4">
                <label className="block text-xs uppercase mb-1" style={{ color: 'var(--muted)' }}>Há proposta de efetivação ao final do estágio?</label>
                <select className="input" style={{ maxWidth: 200 }} value={efetivacao || ''} onChange={e => onEfetivacaoChange(e.target.value)}>
                  <option value="">— Selecione —</option>
                  <option value="Sim">Sim</option>
                  <option value="Não">Não</option>
                </select>
              </div>
            )}
            {sec.campo_texto_positivo && (
              <div className="mt-4">
                <label className="block text-xs uppercase mb-1" style={{ color: 'var(--muted)' }}>{sec.campo_texto_positivo}</label>
                <textarea className="input" rows="3" value={textoPositivoExtra || ''} onChange={e => onTextoPositivoChange(e.target.value)} />
              </div>
            )}
            {sec.campo_texto_negativo && (
              <div className="mt-4">
                <label className="block text-xs uppercase mb-1" style={{ color: 'var(--muted)' }}>{sec.campo_texto_negativo}</label>
                <textarea className="input" rows="3" value={textoNegativoExtra || ''} onChange={e => onTextoNegativoChange(e.target.value)} />
              </div>
            )}
          </>
        );
      }

      // ── escala_3 ──
      if (sec.tipo === 'escala_3') {
        const ops = sec.opcoes || ['Suficiente', 'Insuficiente', 'Não utilizado'];
        return (
          <>
            {header}
            <div className="space-y-2">{(sec.itens || []).map(it => (
              <div key={it} className="flex justify-between items-center gap-3 py-1">
                <span className="text-sm flex-1">{it}</span>
                <div className="flex gap-3 text-xs">{ops.map(o => (
                  <label key={o} className="flex items-center gap-1 cursor-pointer" style={{ color: v[it] === o ? 'var(--accent)' : 'var(--text)' }}>
                    <input type="radio" checked={v[it] === o} onChange={() => onChange({ ...v, [it]: o })} /> {o}
                  </label>
                ))}</div>
              </div>
            ))}</div>
            {sec.campo_texto && (
              <div className="mt-4">
                <label className="block text-xs uppercase mb-1" style={{ color: 'var(--muted)' }}>{sec.campo_texto}</label>
                <textarea className="input" rows="3" value={textoExtra || ''} onChange={e => onTextoChange(e.target.value)} />
              </div>
            )}
          </>
        );
      }

      // ── escala_1_4_multi ──
      if (sec.tipo === 'escala_1_4_multi') {
        return (
          <>
            {header}
            <div className="overflow-x-auto"><table className="w-full text-sm"><thead><tr style={{ color: 'var(--muted)', fontSize: 11 }}>
              <th></th>{(sec.colunas || []).map(c => <th key={c} className="text-center pb-2 px-2">{c}</th>)}
            </tr></thead><tbody>
              {(sec.itens || []).map(it => {
                const linha = v[it] || {};
                return (
                  <tr key={it} style={{ borderTop: '1px solid var(--border)' }}>
                    <td className="py-2 pr-3">{it}</td>
                    {(sec.colunas || []).map(c => (
                      <td key={c} className="py-2 px-1 text-center">
                        <div className="inline-flex gap-0.5">{[1,2,3,4].map(n => (
                          <button key={n} style={{ width: 24, height: 24, fontSize: 11, borderRadius: 4, background: linha[c] === n ? 'var(--accent)' : 'transparent', border: `1px solid ${linha[c] === n ? 'var(--accent)' : 'var(--border)'}`, color: linha[c] === n ? 'white' : 'var(--text)' }} onClick={() => onChange({ ...v, [it]: { ...linha, [c]: n } })}>{n}</button>
                        ))}</div>
                      </td>
                    ))}
                  </tr>
                );
              })}
            </tbody></table></div>
            {sec.campo_texto && (
              <div className="mt-4">
                <label className="block text-xs uppercase mb-1" style={{ color: 'var(--muted)' }}>{sec.campo_texto}</label>
                <textarea className="input" rows="3" value={textoExtra || ''} onChange={e => onTextoChange(e.target.value)} />
              </div>
            )}
          </>
        );
      }

      // ── checkbox_duplo ──
      if (sec.tipo === 'checkbox_duplo') {
        return (
          <>
            {header}
            <div className="overflow-x-auto"><table className="w-full text-sm"><thead><tr style={{ color: 'var(--muted)', fontSize: 11 }}>
              <th></th>{(sec.colunas || []).map(c => <th key={c} className="text-center pb-2 px-2">{c}</th>)}
            </tr></thead><tbody>
              {(sec.itens || []).map(it => {
                const linha = v[it] || [];
                return (
                  <tr key={it} style={{ borderTop: '1px solid var(--border)' }}>
                    <td className="py-2 pr-3">{it}</td>
                    {(sec.colunas || []).map(c => (
                      <td key={c} className="py-2 text-center">
                        <input type="checkbox" checked={linha.includes(c)} onChange={e => {
                          const ns = e.target.checked ? [...linha, c] : linha.filter(x => x !== c);
                          onChange({ ...v, [it]: ns });
                        }} />
                      </td>
                    ))}
                  </tr>
                );
              })}
            </tbody></table></div>
            {sec.campo_texto && (
              <div className="mt-4">
                <label className="block text-xs uppercase mb-1" style={{ color: 'var(--muted)' }}>{sec.campo_texto}</label>
                <textarea className="input" rows="3" value={textoExtra || ''} onChange={e => onTextoChange(e.target.value)} />
              </div>
            )}
          </>
        );
      }

      return null;
    }

    // GerarRelatorio removido — unificado em PreencherFormulario (com seção "Observações gerais").

    // ═══════════════════════════════════════════════════════
    //  SUPERVISOR — APP
    // ═══════════════════════════════════════════════════════
    function SupervisorApp() {
      const [page, setPage] = useState('processos');
      const items = [
        { id: 'processos', label: 'Processos', icon: Icon.relatorios },
        { id: 'documentos', label: 'Documentos', icon: Icon.docs },
      ];
      return (
        <div className="flex" style={{ height: '100vh' }}>
          <SimpleSidebar active={page} onNav={setPage} items={items} />
          <main className="flex-1 overflow-y-auto" style={{ padding: 24 }}>
            {page === 'processos' && <SupervisorProcessos />}
            {page === 'documentos' && <SupervisorDocumentos />}
          </main>
        </div>
      );
    }

    function SupervisorProcessos() {
      const [processos, setProcessos] = useState(null);
      const [loading, setLoading] = useState(true);
      const [selected, setSelected] = useState(null);
      useEffect(() => { Api.processos().then(setProcessos).finally(() => setLoading(false)); }, []);
      if (loading) return <LoadingBlock />;
      return (
        <div className="space-y-4">
          <h1 className="text-2xl font-bold">Processos da empresa</h1>
          <div className="space-y-3">
            {(processos || []).map(p => (
              <div key={p.id} className="surface p-4 cursor-pointer" onClick={() => setSelected(p)}>
                <div className="flex justify-between items-center">
                  <div><div className="font-semibold">Processo #{p.id}</div><div className="text-xs mt-1" style={{ color: 'var(--muted)' }}>{p.horas_semanais}h/sem · {p.data_inicio_prevista} → {p.data_fim_prevista}</div></div>
                  <StatusBadge status={p.status} />
                </div>
              </div>
            ))}
            {(!processos || processos.length === 0) && <div className="surface p-8 text-center" style={{ color: 'var(--muted)' }}>Nenhum processo.</div>}
          </div>
          {selected && <ProcessoDetailModal processo={selected} onClose={() => setSelected(null)} onChanged={() => Api.processos().then(setProcessos)} role="supervisor" />}
        </div>
      );
    }

    function SupervisorDocumentos() {
      const toast = useToast();
      const [docs, setDocs] = useState([]);
      const [loading, setLoading] = useState(true);
      useEffect(() => { Api.documentos().then(setDocs).catch(e => toast.error(e.message)).finally(() => setLoading(false)); }, [toast]);
      if (loading) return <LoadingBlock />;
      return (
        <div className="space-y-4">
          <h1 className="text-2xl font-bold">Documentos</h1>
          <div className="space-y-2">
            {docs.map(d => (
              <div key={d.id} className="surface p-3 flex justify-between items-center gap-3">
                <div><div className="text-sm font-medium">{TIPO_DOC[d.tipo] || d.tipo}</div><div className="text-xs" style={{ color: 'var(--muted)' }}>Processo #{d.processo} · v{d.versao}</div></div>
                <DocStatusBadge status={d.status} />
                {d.arquivo && <a href={d.arquivo} target="_blank" rel="noreferrer" className="btn btn-secondary" style={{ fontSize: 11 }}>Abrir</a>}
              </div>
            ))}
            {docs.length === 0 && <div className="surface p-8 text-center" style={{ color: 'var(--muted)' }}>Nenhum documento.</div>}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════
    //  APP ROUTER
    // ═══════════════════════════════════════════════════════
    function App() {
      const { user } = useAuth();
      const [auth, setAuth] = useState('login');
      if (!user) return auth === 'login' ? <LoginPage onGoRegister={() => setAuth('register')} /> : <RegisterPage onGoLogin={() => setAuth('login')} />;
      if (user.tipo === 'coordenador' || isVisaoGlobal(user)) return <CoordApp />;
      if (user.tipo === 'aluno') return <AlunoApp />;
      if (user.tipo === 'supervisor_empresa') return <SupervisorApp />;
      return <CoordApp />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(
      <ToastProvider>
        <AuthProvider>
          <App />
        </AuthProvider>
      </ToastProvider>
    );
  </script>
</body>
</html>
