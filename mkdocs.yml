---
repo_url: https://github.com/Projetos-de-Extensao/PBE_26.1_8002_I
site_author: PBE_26.1_8002_I
site_name: PBE_26.1_8002_I
copyright: Copyright ©️ 2025, PBE_26.1_8002_I

nav: 
  - Home: index.md
  - Iniciação: 
      - index: Iniciacao/index.md
      - Pesquisa:
          - Visão Geral: Iniciacao/pesquisa-detalhes/index.md
          - Legislação Trabalhista: Iniciacao/pesquisa-detalhes/legislacao_trabalhista.md
          - Legislação MEC - DCN: Iniciacao/pesquisa-detalhes/legislacao_mec_dcn.md
          - Normas Acadêmicas do IBMEC: Iniciacao/pesquisa-detalhes/normas_academicas_ibmec.md
          - Pesquisa Aplicações: Iniciacao/pesquisa-detalhes/pesquisa_aplicacoes.md
          - Validação de Documentos: Iniciacao/pesquisa-detalhes/validacao_documentos.md
      - 5w2h: Iniciacao/5w2h.md
      - Brainstorming: Iniciacao/Brainstorming.md
      - Mapa Mental: Iniciacao/mapa_mental.md
      - Prototipagem Baixa Fidelidade: Iniciacao/prototipo_baixa_fidelidade.md
  - Elaboração:
      - Index: Elaboracao/index.md
      - Requisitos: Elaboracao/Requisitos/Requisitos-Gerais.md
      - Requisitos de Arquitetura: Elaboracao/Requisitos/Requisitos-ArqteUrb.md
      - Casos de Uso: Elaboracao/casos_de_uso.md
      - Diagrama de Classes: Elaboracao/diagrma_de_classes.md
      - Protótipo de Alta Fidelidade: Elaboracao/prototipo_alta_fidelidade.md
      - DAS: Elaboracao/das.md
  - Construção:
      - Index: Construcao/index.md
      - Git Issues: Construcao/git_issues.md
      - GitHub Projects: Construcao/github_projects.md
      - CodeSpace: Construcao/codespace.md
      - API:
          - Visão Geral: Construcao/api/index.md
          - Autenticação: Construcao/api/autenticacao.md
          - Endpoints: Construcao/api/endpoints.md
          - Regras de Negócio: Construcao/api/regras-negocio.md
          - Máquina de Estados: Construcao/api/state-machine.md
          - Exemplos de Uso: Construcao/api/exemplos.md
          - Códigos de Erro: Construcao/api/erros.md
  - Transição:
      - Index: Transicao/index.md
      - Manual do Usuário (com front-end): Transicao/manual-do-usuario.md
      - Manual do Usuário (sem front-end): Transicao/manual_usuario.md


extra_css:
  - css/extra.css

markdown_extensions:
  # Tooltips
  - abbr
  # Admonitions
  - admonition
  # Annotations, Buttons, Grids, Icons & Emojis, Images, Tooltips
  - attr_list
  # Footnotes
  - footnotes
  # Annotations, Grids, Images
  - md_in_html
  # Images
  - pymdownx.blocks.caption
  # Formatting
  - pymdownx.caret
  # Formatting
  - pymdownx.critic
  # Admonitions
  - pymdownx.details
  # Icons & Emojis
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji ''
      emoji_generator: !!python/name:material.extensions.emoji.to_svg ''
  # Code Blocks
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  # Code Blocks
  - pymdownx.inlinehilite
  # Formatting
  - pymdownx.keys
  # Formatting
  - pymdownx.mark
  # Code Blocks, Tooltips
  - pymdownx.snippets
  # Admonitions, Annotations, Code Blocks, Content Tabs
  - pymdownx.superfences
  # Content Tabs
  - pymdownx.tabbed:
      alternate_style: true
  # Lists
  - pymdownx.tasklist:
      custom_checkbox: true
  # Formatting
  - pymdownx.tilde
  # Data Tables

  - toc:
      permalink: true

plugins:
  - plantuml:
      puml_url: https://www.plantuml.com/plantuml/
  - minify:
      minify_html: true
  - search

theme:
  name: material
  logo: assets/ibmec_logo.png
  language: pt-BR
  favicon: assets/ibmec_logo.png

  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode

    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: pink
      accent: pink
      toggle:
        icon: material/toggle-switch-off
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: pink
      accent: pink
      toggle:
        icon: material/toggle-switch-off
        name: Switch to system preference
    
  features:
    - content.code.copy
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - toc.integrate
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github
    logo: simple/react
    favicon: simple/react
